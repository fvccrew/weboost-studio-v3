<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#FCD34D"/>
            <stop offset="100%" style="stop-color:#F59E0B"/>
        </linearGradient>
    </defs>
    
    <!-- Fusée icône à gauche -->
    <g transform="translate(20, 15)">
        <linearGradient id="rocketGrad" x1="25" y1="0" x2="25" y2="70">
            <stop offset="0%" style="stop-color:#1E293B"/>
            <stop offset="100%" style="stop-color:#0F172A"/>
        </linearGradient>
        <path d="M 25 0 L 35 25 L 35 60 L 15 60 L 15 25 Z" fill="url(#rocketGrad)" stroke="#FCD34D" stroke-width="2"/>
        <path d="M 25 0 L 15 25 L 35 25 Z" fill="#0F172A" stroke="#FCD34D" stroke-width="2"/>
        <circle cx="25" cy="15" r="5" fill="#FCD34D"/>
        <path d="M 15 45 L 8 60 L 15 60 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
        <path d="M 35 45 L 42 60 L 35 60 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
        <path d="M 25 60 L 21 70 L 25 80 L 29 70 Z" fill="#FCD34D" opacity="0.8"/>
    </g>
    
    <!-- Texte WEBOOST -->
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGradient)" letter-spacing="-1">WEBOOST</text>
    
    <!-- Texte STUDIO en dessous -->
    <text x="92" y="92" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#94a3b8" letter-spacing="6">STUDIO</text>
</svg>
