<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="rocketGrad" x1="32" y1="6" x2="32" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color:#1E293B"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
  </defs>
  
  <!-- Fond arrondi sombre -->
  <rect width="64" height="64" rx="14" fill="#050505"/>
  
  <!-- Fusée centrée et agrandie -->
  <g transform="translate(14, 4) scale(0.72)">
    <!-- Corps -->
    <path d="M 25 0 L 35 25 L 35 60 L 15 60 L 15 25 Z" fill="url(#rocketGrad)" stroke="#FCD34D" stroke-width="2"/>
    <!-- Pointe -->
    <path d="M 25 0 L 15 25 L 35 25 Z" fill="#0F172A" stroke="#FCD34D" stroke-width="2"/>
    <!-- Hublot -->
    <circle cx="25" cy="15" r="5" fill="#FCD34D"/>
    <!-- Aileron gauche -->
    <path d="M 15 45 L 8 60 L 15 60 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
    <!-- Aileron droit -->
    <path d="M 35 45 L 42 60 L 35 60 Z" fill="#1E293B" stroke="#FCD34D" stroke-width="1.5"/>
    <!-- Flamme -->
    <path d="M 25 60 L 21 70 L 25 80 L 29 70 Z" fill="#FCD34D" opacity="0.8"/>
  </g>
</svg>
